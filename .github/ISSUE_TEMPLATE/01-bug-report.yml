name: Bug report
description: Report inaccurate guidance, artifact issues, or workflow failures.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: input
    id: area
    attributes:
      label: Affected area
      description: Name the section, glossary entry, artifact, or workflow involved.
      placeholder: Glossary term, section 7, validate-metrics workflow
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction details
      description: Include references, commands, screenshots, or supporting evidence.
