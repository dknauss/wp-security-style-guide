name: Generate PDF, Word & EPUB Documents

on:
  push:
    branches: [main]
    paths:
      - 'WP-Security-Style-Guide.md'
      - '.github/workflows/generate-docs.yml'
      - '.github/pandoc/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-docs:
    uses: dknauss/ai-assisted-docs/.github/workflows/reusable-generate-docs.yml@fcd4f51944026f82316df03e73882a607a09dc37
    with:
      primary_markdown: WP-Security-Style-Guide.md
    secrets: inherit
