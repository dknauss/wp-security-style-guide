name: Validate Metrics

on:
  pull_request:
    paths:
      - 'WP-Security-Style-Guide.md'
      - 'docs/current-metrics.md'
      - '.github/scripts/verify-metrics.sh'
      - '.github/workflows/validate-metrics.yml'
  push:
    branches: [main]
    paths:
      - 'WP-Security-Style-Guide.md'
      - 'docs/current-metrics.md'
      - '.github/scripts/verify-metrics.sh'
      - '.github/workflows/validate-metrics.yml'
  workflow_dispatch:

jobs:
  validate-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Verify metrics values
        run: bash .github/scripts/verify-metrics.sh docs/current-metrics.md
