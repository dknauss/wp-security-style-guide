name: Validate PDF Visuals

on:
  workflow_run:
    workflows:
      - 'Generate PDF, Word & EPUB Documents'
    types:
      - completed
    branches:
      - main
  push:
    branches: [main]
    paths:
      - '.github/scripts/validate-pdf-visual.mjs'
      - '.github/workflows/validate-pdf-visual.yml'
      - '.github/test-artifacts/pdf-baselines/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-pdf-visual:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'refs/heads/main' || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate PDF visuals
        run: xvfb-run -a npm run validate:pdf-visual

      - name: Upload visual diff artifacts
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: pdf-visual-diffs
          path: output/playwright/pdf-visual
          if-no-files-found: ignore
